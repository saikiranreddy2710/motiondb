version: "3.8"

services:
  motiondb:
    build: .
    image: motiondb/motiondb:latest
    container_name: motiondb
    ports:
      - "5431:5431"   # PostgreSQL wire protocol
      - "5432:5432"   # gRPC
    volumes:
      - motiondb-data:/var/lib/motiondb/data
      - ./initdb:/docker-entrypoint-initdb.d  # mount init SQL scripts
    environment:
      - MOTION_HOST=0.0.0.0
      - MOTION_PORT=5432
      - MOTION_LOG_LEVEL=info
      # Uncomment to enable auth:
      # - MOTION_AUTH=true
      # - MOTION_ADMIN_PASSWORD=changeme
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "motiond", "--version"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  motiondb-data:
    driver: local
